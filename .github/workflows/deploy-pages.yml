name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply database migrations (Liquibase)
        env:
          LIQUIBASE_COMMAND_URL: ${{ secrets.SUPABASE_DB_URL }}
          LIQUIBASE_COMMAND_USERNAME: postgres.bsuvxhymylxvdksijanj
          LIQUIBASE_COMMAND_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          docker run --rm \
            -e LIQUIBASE_COMMAND_URL -e LIQUIBASE_COMMAND_USERNAME -e LIQUIBASE_COMMAND_PASSWORD \
            -v "$PWD/db/changelog:/liquibase/changelog" \
            liquibase/liquibase:4.31 \
            --changelog-file=changelog/db.changelog-master.sql update

  build:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Inject runtime config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > public/supabase-config.js <<EOF
          window.SUPABASE_CONFIG = {
            url: "${SUPABASE_URL}",
            anonKey: "${SUPABASE_ANON_KEY}"
          };
          EOF
      - run: npx ng build --configuration production
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/khata/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
