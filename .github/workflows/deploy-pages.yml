name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Inject runtime config from the GOOGLE_API_KEY secret
        run: |
          cat > public/google-config.js <<'EOF'
          window.GOOGLE_CONFIG = {
            clientId: "556658401647-soqsutprr74h5723vdcm03sfaikus68a.apps.googleusercontent.com",
            apiKey: "${{ secrets.GOOGLE_API_KEY }}",
            appId: ""
          };
          EOF
      - run: npx ng build --configuration production
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/khata/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
